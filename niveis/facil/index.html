<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#24110b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Escape Room - A casa abandonada</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="imagens/icone.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="theme-audio" src="sons/musica-tema.mp3" loop preload="auto"></audio>
  <audio id="tick-audio" src="sons/tic-tac.mp3" loop preload="auto"></audio>
  <audio id="correct-audio" src="sons/acerto.mp3" preload="auto"></audio>
  <audio id="wrong-audio" src="sons/erro.mp3" preload="auto"></audio>
  <audio id="timeout-audio" src="sons/tempo-esgotado.mp3" preload="auto"></audio>
  <audio id="victory-audio" src="sons/vitoria.mp3" preload="auto"></audio>
  <audio id="defeat-audio" src="sons/derrota.mp3" preload="auto"></audio>
  <div class="top-actions">
    <button id="install-button" class="fullscreen-button hidden-action" type="button" aria-label="Instalar jogo no celular">Instalar</button>
    <button id="sound-button" class="fullscreen-button" type="button" aria-label="Ativar ou desativar som">Som: ligado</button>
    <button id="fullscreen-button" class="fullscreen-button" type="button" aria-label="Ativar tela cheia">Tela cheia</button>
  </div>
  <main id="app" class="app" aria-live="polite"></main>
  <script src="script.js"></script>
</body>
</html>
